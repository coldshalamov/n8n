# Render Blueprint for RehabOps services hosted from this repository.
#
# n8n stays on the existing free Render image service. Add Supabase Postgres
# DB_* environment variables in Render once the database connection details are
# ready; until then the service stays healthy on the image default storage.

services:
  - type: web
    name: n8n-server
    runtime: image
    image:
      url: docker.n8n.io/n8nio/n8n:latest
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: N8N_PORT
        value: "10000"
      - key: PORT
        value: "10000"
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n-server-pz47.onrender.com/
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-server-pz47.onrender.com/
      - key: N8N_USER_FOLDER
        value: /home/node/.n8n
      - key: N8N_ENCRYPTION_KEY
        sync: false
      - key: N8N_PROXY_HOPS
        value: "1"
      - key: N8N_RUNNERS_GRANT_TOKEN_TTL
        value: "300"
      - key: GENERIC_TIMEZONE
        value: America/New_York
      - key: TZ
        value: America/New_York
      - key: DIGEST_WEBHOOK_URL
        sync: false
      - key: OWNER_ALERT_WEBHOOK
        sync: false
      - key: CONTRACTOR_REMIND_WEBHOOK
        sync: false

  - type: web
    name: rehab-ops-email-server
    runtime: docker
    rootDir: email-server
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: N8N_NEW_EMAIL_WEBHOOK
        sync: false

  - type: web
    name: rehab-ops-mcp-server
    runtime: docker
    rootDir: mcp-server
    plan: free
    region: oregon
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MCP_API_KEY
        generateValue: true
